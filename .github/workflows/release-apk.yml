name: Build release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties (sdk.dir)
        run: |
          set -euo pipefail
          SDK_DIR="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "${SDK_DIR}"
          # Gradle prefers forward slashes even on Windows agents
          echo "sdk.dir=${SDK_DIR}" > local.properties

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          test -n "${SIGNING_KEYSTORE_BASE64}"
          mkdir -p keystore
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > keystore/release.jks

      - name: Write keystore.properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          test -n "${SIGNING_STORE_PASSWORD}"
          test -n "${SIGNING_KEY_PASSWORD}"
          KEY_ALIAS="${SIGNING_KEY_ALIAS:-release}"
          printf '%s\n' \
            "storeFile=keystore/release.jks" \
            "storePassword=${SIGNING_STORE_PASSWORD}" \
            "keyAlias=${KEY_ALIAS}" \
            "keyPassword=${SIGNING_KEY_PASSWORD}" \
            > keystore.properties

      - name: Gradle wrapper permissions
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zaxifin-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload APK to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
